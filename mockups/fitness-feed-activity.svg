<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" role="img" aria-labelledby="t2">
  <title id="t2">Crew activity sparkline chart mockup</title>
  <defs>
    <linearGradient id="darkBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#262626"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="220" rx="16" fill="url(#darkBg)"/>
  <rect x="20" y="18" width="360" height="184" rx="12" fill="#171717" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="36" y="46" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" opacity="0.45" letter-spacing="0.08em">SESSION LOAD</text>
  <text x="346" y="46" font-family="ui-monospace,monospace" font-size="10" fill="#A3A3A3" text-anchor="end">7d</text>
  <!-- grid -->
  <line x1="36" y1="158" x2="364" y2="158" stroke="#FFFFFF" stroke-opacity="0.06"/>
  <line x1="36" y1="118" x2="364" y2="118" stroke="#FFFFFF" stroke-opacity="0.04"/>
  <line x1="36" y1="78" x2="364" y2="78" stroke="#FFFFFF" stroke-opacity="0.04"/>
  <!-- area under curve -->
  <path d="M36 148 L72 132 L108 142 L144 98 L180 112 L216 72 L252 88 L288 62 L324 78 L364 54 L364 158 L36 158 Z" fill="#FFFFFF" fill-opacity="0.06"/>
  <!-- main line -->
  <path d="M36 148 L72 132 L108 142 L144 98 L180 112 L216 72 L252 88 L288 62 L324 78 L364 54" fill="none" stroke="#FFFFFF" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"/>
  <!-- points -->
  <circle cx="144" cy="98" r="4" fill="#0A0A0A" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="288" cy="62" r="4" fill="#0A0A0A" stroke="#FFFFFF" stroke-width="2"/>
  <!-- legend -->
  <rect x="36" y="174" width="8" height="8" rx="2" fill="#FFFFFF"/>
  <text x="50" y="182" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#FFFFFF" opacity="0.55">Your crew &#183; avg</text>
</svg>
