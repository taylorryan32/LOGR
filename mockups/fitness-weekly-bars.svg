<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-labelledby="t1">
  <title id="t1">Weekly training volume chart mockup</title>
  <defs>
    <linearGradient id="barFill" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#404040"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#panel)"/>
  <rect x="20" y="28" width="360" height="44" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text x="36" y="56" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="700" fill="#0A0A0A">Weekly volume</text>
  <text x="354" y="56" font-family="ui-monospace,monospace" font-size="11" fill="#737373" text-anchor="end">lb</text>
  <text x="32" y="92" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#A3A3A3" letter-spacing="0.06em">MON TUE WED THU FRI SAT SUN</text>
  <!-- grid -->
  <line x1="32" y1="165" x2="368" y2="165" stroke="#E5E5E5" stroke-width="1"/>
  <line x1="32" y1="130" x2="368" y2="130" stroke="#F5F5F5" stroke-width="1"/>
  <line x1="32" y1="95" x2="368" y2="95" stroke="#F5F5F5" stroke-width="1"/>
  <!-- bars: heights vary -->
  <rect x="40" y="118" width="36" height="47" rx="4" fill="url(#barFill)"/>
  <rect x="88" y="95" width="36" height="70" rx="4" fill="url(#barFill)" opacity="0.92"/>
  <rect x="136" y="142" width="36" height="23" rx="4" fill="#D4D4D4"/>
  <rect x="184" y="108" width="36" height="57" rx="4" fill="url(#barFill)"/>
  <rect x="232" y="88" width="36" height="77" rx="4" fill="url(#barFill)"/>
  <rect x="280" y="125" width="36" height="40" rx="4" fill="url(#barFill)" opacity="0.88"/>
  <rect x="328" y="102" width="36" height="63" rx="4" fill="url(#barFill)"/>
  <!-- labels -->
  <text x="58" y="188" font-family="ui-monospace,monospace" font-size="9" fill="#A3A3A3" text-anchor="middle">M</text>
  <text x="106" y="188" font-family="ui-monospace,monospace" font-size="9" fill="#A3A3A3" text-anchor="middle">T</text>
  <text x="154" y="188" font-family="ui-monospace,monospace" font-size="9" fill="#A3A3A3" text-anchor="middle">W</text>
  <text x="202" y="188" font-family="ui-monospace,monospace" font-size="9" fill="#A3A3A3" text-anchor="middle">T</text>
  <text x="250" y="188" font-family="ui-monospace,monospace" font-size="9" fill="#A3A3A3" text-anchor="middle">F</text>
  <text x="298" y="188" font-family="ui-monospace,monospace" font-size="9" fill="#A3A3A3" text-anchor="middle">S</text>
  <text x="346" y="188" font-family="ui-monospace,monospace" font-size="9" fill="#A3A3A3" text-anchor="middle">S</text>
  <text x="32" y="220" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#737373">Peak: Fri &#183; 14,200 lb</text>
</svg>
