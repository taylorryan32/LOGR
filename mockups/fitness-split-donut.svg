<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="t4">
  <title id="t4">Training split donut chart mockup</title>
  <defs>
    <linearGradient id="seg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0A0A0A"/><stop offset="100%" stop-color="#404040"/></linearGradient>
    <linearGradient id="seg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#737373"/><stop offset="100%" stop-color="#A3A3A3"/></linearGradient>
    <linearGradient id="seg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#D4D4D4"/><stop offset="100%" stop-color="#E5E5E5"/></linearGradient>
  </defs>
  <rect width="200" height="200" fill="#FFFFFF"/>
  <!-- ring C=2πr ≈ 389.56 for r=62 -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="#F5F5F5" stroke-width="28"/>
  <circle cx="100" cy="100" r="62" fill="none" stroke="url(#seg1)" stroke-width="28"
