  <circle cx="100" cy="100" r="38" fill="#FFFFFF"/>
  <text x="100" y="96" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="800" fill="#0A0A0A" text-anchor="middle">38%</text>
  <text x="100" y="112" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#737373" text-anchor="middle">Push</text>
  <rect x="24" y="158" width="152" height="30" rx="6" fill="#FAFAFA" stroke="#E5E5E5"/>
  <circle cx="38" cy="173" r="4" fill="#0A0A0A"/>
  <text x="48" y="176" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#525252">Push</text>
  <circle cx="92" cy="173" r="4" fill="#737373"/>
  <text x="102" y="176" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#525252">Pull</text>
  <circle cx="142" cy="173" r="4" fill="#D4D4D4"/>
  <text x="152" y="176" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#525252">Legs</text>
