<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-labelledby="t3">
  <title id="t3">Monthly volume and PR trend chart mockup</title>
  <defs>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#525252"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="#FFFFFF"/>
  <text x="24" y="36" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#0A0A0A">Volume &#183; 12 weeks</text>
  <text x="370" y="36" font-family="ui-monospace,monospace" font-size="10" fill="#737373" text-anchor="end">lbs</text>
  <line x1="24" y1="152" x2="376" y2="152" stroke="#E5E5E5"/>
  <line x1="24" y1="118" x2="376" y2="118" stroke="#F5F5F5"/>
  <line x1="24" y1="84" x2="376" y2="84" stroke="#F5F5F5"/>
  <!-- PR markers -->
  <circle cx="128" cy="108" r="5" fill="#0A0A0A"/>
  <line x1="128" y1="108" x2="128" y2="152" stroke="#0A0A0A" stroke-opacity="0.15" stroke-dasharray="3 4"/>
  <text x="128" y="170" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#737373" text-anchor="middle">PR</text>
  <circle cx="268" cy="74" r="5" fill="#0A0A0A"/>
  <line x1="268" y1="74" x2="268" y2="152" stroke="#0A0A0A" stroke-opacity="0.15" stroke-dasharray="3 4"/>
  <text x="268" y="170" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#737373" text-anchor="middle">PR</text>
  <!-- trend area + line -->
  <path d="M40 138 L76 124 L112 132 L148 104 L184 118 L220 76 L256 94 L292 62 L328 82 L364 56 L364 152 L40 152 Z" fill="url(#areaGrad)"/>
  <path d="M40 138 L76 124 L112 132 L148 104 L184 118 L220 76 L256 94 L292 62 L328 82 L364 56" fill="none" stroke="url(#lineStroke)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- month ticks -->
  <text x="40" y="188" font-family="ui-monospace,monospace" font-size="8" fill="#A3A3A3">W1</text>
  <text x="112" y="188" font-family="ui-monospace,monospace" font-size="8" fill="#A3A3A3">W4</text>
  <text x="184" y="188" font-family="ui-monospace,monospace" font-size="8" fill="#A3A3A3">W8</text>
  <text x="340" y="188" font-family="ui-monospace,monospace" font-size="8" fill="#A3A3A3">W12</text>
</svg>
